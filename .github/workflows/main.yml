name: Update portfolio

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@master
        with:
          submodules: true
      - name: Publish Portfolio
        uses: chabad360/hugo-gh-pages@v1.1
        with:
          githubToken: ${{ secrets.PERSONAL_TOKEN }}
          repo: yanuehara/yanuehara.github.io
          hugoVersion: 0.54.0
